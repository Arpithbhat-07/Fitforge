<h2>FitForge Admin Alert</h2>
<p>Hello Admin,</p>

<p>There is a new system event that requires attention.</p>

<div style="background-color: #0B0B0B; border: 1px solid #FF5A1F; padding: 20px; margin: 20px 0; border-radius: 4px;">
  <h3 style="color: #FF5A1F; margin-top: 0; text-transform: uppercase;">{{ event_type }}</h3>
  <p style="color: #CFCFCF; margin-bottom: 0; line-height: 1.6;">{{ event_details }}</p>
</div>

<div style="text-align: center; margin: 30px 0;">
  {{ action_button }}
</div>

<p>FitForge CMS Notification Engine</p>
